server:
  port: 8082

spring:
  application:
    name: raceflow-room-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/rooms
    username: ${DB_USER:raceflow}
    password: ${DB_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: local

# OpenTelemetry — config fallback para ejecucion local sin Docker
# El agente lee estas propiedades si las env vars OTEL_* no estan definidas
otel:
  service:
    name: ${OTEL_SERVICE_NAME:raceflow-room-service}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
